# Fixed-trace prefix-sufficiency screen, candidate budget=512 — secondary,
# additive diagnostic (kvcot.analysis.fixed_trace), NOT a Stage 0-2 config
# and NOT part of the frozen stage funnel (docs/EXPERIMENT.md §4). Uses
# `kvcot replay-fixed-trace`/`analyze-fixed-trace`, never `replay-probe`.
stage_name: early_gap_b512
lock_config_path: configs/lock.yaml
dataset_manifest: data/manifests/gsm8k_calibration_50.jsonl
conditions: [full, rkv_b512]
rkv_budgets: [512]
output_dir: results/raw/early_gap_b512
limit: 10
seeds_override: [42]

# Protocol v2 (2026-07-16, CHANGELOG.md): a teacher-forced boxed-answer
# prefix replaces the empty fixed-trace suffix, so the model reliably emits
# a `\boxed{...}` answer within a short budget instead of writing a verbose
# structured re-derivation that hits the frozen 48-token probe cap. This
# stage's own decoding/eligibility settings live here, separate from the
# frozen `configs/lock.yaml` probes.* block.
fixed_trace:
  probe_max_new_tokens: 64
  require_boxed_extraction: true
  min_eligible_examples: 5
  min_actual_compression_rate: 0.7
  max_mean_f1_retention_ratio: 0.7

notes: >
  Ten-example, one-seed fixed-trace gap screen. Not a publishable estimate —
  PSS/Delta_PSS at n=10 produces descriptive counts only, no p-value
  (kvcot.analysis.fixed_trace). FullKV supplies the canonical trace; the same
  trace is replayed under FullKV and R-KV via `kvcot replay-fixed-trace`.
  Budget escalation: if compression rarely fires at 512, try
  early_gap_b256.yaml; if it fires but destroys accuracy, try
  early_gap_b1024.yaml instead of stepping down to 256. Run
  `kvcot inspect-fixed-trace` against the canonical trace before replaying —
  it stops immediately if no trace is longer than this budget.
