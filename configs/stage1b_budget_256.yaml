# Stage 1B — fixed-budget calibration, candidate budget=256 (§10).
stage_name: stage1b_budget_256
lock_config_path: configs/lock.yaml
dataset_manifest: data/manifests/gsm8k_calibration_50.jsonl
conditions: [full, rkv_b256]
rkv_budgets: [256]
output_dir: results/raw/stage1b_budget_256
limit: 50
seeds_override: [42]
notes: >
  Compaction-activation gate (real, n=50 is ample): >=1 compaction in >=50%
  of valid traces. Accuracy gate is a coarse_screen only (§10) — reject only
  if this budget's calibration accuracy CI excludes FullKV's point estimate.
  Never label it `equivalence`.
