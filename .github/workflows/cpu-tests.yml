name: CPU tests

on:
  pull_request:
  push:
    branches:
      - main
      - 'research/**'

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Initialize pinned R-KV submodule
        run: git submodule update --init --recursive

      - name: Verify full git history for B2A-R3 real-evidence tests
        run: |
          test "$(git rev-parse --is-shallow-repository)" = "false"
          git cat-file -e 4117baea139f745ceeff85039258445639e85049^{commit}
          git cat-file -e 87b995c90a317863b2d3b44bbc345018ae9356b6^{commit}
          git cat-file -e 56d257236874d8947d5f127bf2074824cff62395^{commit}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CPU-only torch
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.6.0 \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install CPU/test dependencies only
        run: |
          python -m pip install -e ".[cpu-tools,dev]"

      - name: Verify CPU-only torch
        run: |
          python - <<'PY'
          import torch

          print("torch_version:", torch.__version__)
          print("torch_cuda_version:", torch.version.cuda)
          print("torch_cuda_available:", torch.cuda.is_available())

          assert torch.__version__.split("+")[0] == "2.6.0"
          assert torch.version.cuda is None
          assert torch.cuda.is_available() is False
          PY

      - name: Byte-compile source and tests
        run: python -m compileall src tests

      - name: Collect tests (no execution)
        run: python -m pytest --collect-only

      - name: Run CPU-safe test suite
        run: python -m pytest -m "not gpu" -q

      - name: Check for whitespace/diff issues
        run: git diff --check
